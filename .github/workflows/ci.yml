name: CI/CD Pipeline - Backend

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build_and_analyze:
    name: Compilar, Testear y Analizar con SonarQube
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Vital para SonarQube (necesita historial de git)

      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Cache de paquetes de SonarQube
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache de dependencias de Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # QA-01: ejecutar todos los tests JUnit
      # QA-02: mvn verify activa JaCoCo (prepare-agent + report)
      #        El informe jacoco.xml queda en target/site/jacoco/
      #        y sonar-maven-plugin lo recoge automáticamente.
      - name: Ejecutar tests y generar cobertura (JaCoCo)
        working-directory: backend
        run: mvn -B verify --no-transfer-progress

      # QA-02: análisis estático con SonarQube.
      # El paso se salta si SONAR_HOST_URL no está definido como secreto
      # (p.ej. mientras sonar.sibr.app no está configurado).
      # Cuando esté listo: añadir SONAR_HOST_URL y SONAR_TOKEN en
      # GitHub → Settings → Secrets → Actions y el paso se activará solo.
      - name: Analizar con SonarQube
        if: ${{ env.SONAR_HOST_URL != '' }}
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar \
            -Dsonar.projectKey=nexus-erp \
            -Dsonar.projectName='LevelUp Nexus ERP' \
            --no-transfer-progress