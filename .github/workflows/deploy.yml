name: CD Pipeline - Deploy to VPS

on:
  workflow_run:
    workflows: ["CI/CD Pipeline - Backend"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Desplegar en Producción (IONOS)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Ejecutar despliegue vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/nexus-erp

            git pull origin main

            docker compose --profile production build --no-cache nexus-backend nexus-frontend

            docker compose --profile production up -d

            docker image prune -f