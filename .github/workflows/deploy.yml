name: CD Pipeline - Deploy to VPS

on:
  # Se activa solo cuando el CI (tests) termina con éxito en main
  workflow_run:
    workflows: ["CI/CD Pipeline - Backend"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Desplegar en Producción (IONOS)
    runs-on: ubuntu-latest
    # Solo desplegar si el CI pasó — nunca desplegar código roto
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Despliegue via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /opt/nexus-erp

            echo ">>> Actualizando código..."
            git fetch origin
            git reset --hard origin/main

            echo ">>> Reconstruyendo imágenes..."
            docker compose build --no-cache nexus-backend nexus-frontend

            echo ">>> Aplicando nueva versión..."
            docker compose up -d

            echo ">>> Limpiando imágenes antiguas..."
            docker image prune -f

            echo ">>> Estado final de los contenedores:"
            docker compose ps