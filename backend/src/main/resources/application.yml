#Esto es el chore, todas las varibles se modificaran mas adelante.

spring:
  application:
    name: nexus-backend

  # ─── BASE DE DATOS ────────────────────────────────────────
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ─── JPA / HIBERNATE ──────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ─── FLYWAY ───────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ─── EMAIL ────────────────────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: tucorreo@gmail.com
    password: tupassword
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# ─── SERVIDOR ─────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# ─── JWT ──────────────────────────────────────────────────
jwt:
  secret: clave-local-desarrollo-minimo-32-caracteres-cambiar
  expiration: 28800000

# ─── IA ───────────────────────────────────────────────────
ai:
  gemini:
    api-key: pon-tu-api-key-aqui
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
    model: gemini-2.0-flash
  groq:
    api-key: pon-tu-api-key-aqui
    url: https://api.groq.com/openai/v1/chat/completions
    model: llama-3.1-8b-instant

# ─── LOGGING ──────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.nexus: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ─── ACTUATOR (salud del servidor) ────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized