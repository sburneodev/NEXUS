# Solo muestra las secciones que cambian. El resto del archivo queda igual.

spring:
  application:
    name: nexus-backend

  datasource:
    url:      ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ─── EMAIL ────────────────────────────────────────────────
  # CORRECCIÓN: las credenciales leen de variables de entorno
  mail:
    host:     ${MAIL_HOST:smtp.gmail.com}
    port:     ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}           # ← tu Gmail aquí en .env
    password: ${MAIL_PASSWORD:}           # ← App Password de Gmail en .env
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000

  # Serializar JSON: no incluir campos null en la respuesta
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:UnaClaveSuperSecretaYMuyLargaDeMasDe32CaracteresParaNexusERP}
  expiration: 28800000

# ─── NUEVO: URL base para los enlaces del email ───────────
# En local: http://localhost:8080
# En Docker: http://localhost:8080 (el contexto /api lo añade EmailService)
# En VPS:   https://tudominio.com
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

ai:
  gemini:
    api-key: ${AI_GEMINI_API_KEY:pon-tu-api-key-aqui}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
    model: gemini-2.0-flash
  groq:
    api-key: ${AI_GROQ_API_KEY:pon-tu-api-key-aqui}
    url: https://api.groq.com/openai/v1/chat/completions
    model: llama-3.1-8b-instant

logging:
  level:
    root: INFO
    com.nexus: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized