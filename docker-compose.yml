# ==============================================================================
#  LevelUp Nexus ERP — docker-compose.yml
#  Backend: Java 25 LTS + Spring Boot 4.0
#  BD:      PostgreSQL 16
#  Autores: Desirée Cobo Batalla & Sebastián Burneo Reyes
#  Versión: v1.1.0
# ==============================================================================

services:

  # ────────────────────────────────────────────────────────
  # SERVICIO 1 · nexus-db — PostgreSQL 16
  # ────────────────────────────────────────────────────────
  nexus-db:
    image: postgres:16-alpine
    container_name: nexus_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-nexus_erp}
      POSTGRES_USER:     ${DB_USER:-nexus_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexus_dev_password_2026}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_ES.UTF-8"
    ports:
      - "${DB_PORT_EXTERNAL:-5433}:5432"
    volumes:
      - nexus_pg_data:/var/lib/postgresql/data
      - ./sql/init.sql/init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql:ro
      - ./sql/init.sql/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - ./sql/init.sql/triggers.sql:/docker-entrypoint-initdb.d/03_triggers.sql:ro
      - ./sql/init.sql/add_warehouse_locations.sql:/docker-entrypoint-initdb.d/04_add_warehouse_locations.sql:ro
    networks:
      - nexus_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexus_app} -d ${DB_NAME:-nexus_erp}"]
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 20s

  # ────────────────────────────────────────────────────────
  # SERVICIO 2 · nexus-backend — Java 25 + Spring Boot 4.0
  # ────────────────────────────────────────────────────────
  nexus-backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      args:
        JAVA_VERSION: "25"
    container_name: nexus_backend
    restart: unless-stopped
    depends_on:
      nexus-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://nexus-db:5432/${DB_NAME:-nexus_erp}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-nexus_app}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-nexus_dev_password_2026}
      JWT_SECRET:                 ${JWT_SECRET:-NexusDevSecretKey2026MustBeAtLeast32CharactersLong!}
      JWT_EXPIRATION_SECONDS:     ${JWT_EXPIRATION_SECONDS:-28800}
      AI_GEMINI_API_KEY:          ${AI_GEMINI_API_KEY}
      AI_GROQ_API_KEY:            ${AI_GROQ_API_KEY}
      MAIL_HOST:                  ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT:                  ${MAIL_PORT:-587}
      MAIL_USERNAME:              ${MAIL_USERNAME:-}
      MAIL_PASSWORD:              ${MAIL_PASSWORD:-}
      APP_BASE_URL:               ${APP_BASE_URL:-http://localhost}
      SERVER_PORT:                8080
      SPRING_PROFILES_ACTIVE:     ${SPRING_PROFILE:-dev}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "8"
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      TEMP_PASSWORD: ${TEMP_PASSWORD:-NEXUS2026!}
    ports:
      - "${BACKEND_PORT_EXTERNAL:-8080}:8080"
    volumes:
      - nexus_backend_logs:/app/logs
    networks:
      - nexus_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/actuator/health || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 60s

  # ────────────────────────────────────────────────────────
  # SERVICIO 3 · nexus-frontend — Nginx + React/Vite
  # ────────────────────────────────────────────────────────
  nexus-frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${APP_BASE_URL:-http://localhost}/api
        VITE_APP_VERSION:  ${APP_VERSION:-1.1.0}
    container_name: nexus_frontend
    restart: unless-stopped
    depends_on:
      nexus-backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT_EXTERNAL:-3000}:80"
    networks:
      - nexus_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3

  # ────────────────────────────────────────────────────────
  # SERVICIO 4 · nexus-sonar — SonarQube Community
  # ────────────────────────────────────────────────────────
  nexus-sonar:
    image: sonarqube:community
    container_name: nexus_sonarqube
    restart: unless-stopped
    ports:
      - "${SONAR_PORT_EXTERNAL:-9000}:9000"
    volumes:
      - nexus_sonar_data:/opt/sonarqube/data
      - nexus_sonar_extensions:/opt/sonarqube/extensions
      - nexus_sonar_logs:/opt/sonarqube/logs
    networks:
      - nexus_internal
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ────────────────────────────────────────────────────────
  # SERVICIO 5 · nexus-caddy — Solo producción
  # ────────────────────────────────────────────────────────
  nexus-caddy:
    image: caddy:2-alpine
    container_name: nexus_caddy
    restart: unless-stopped
    depends_on:
      - nexus-frontend
      - nexus-backend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - nexus_caddy_data:/data
      - nexus_caddy_config:/config
    networks:
      - nexus_internal
    profiles:
      - production

# ────────────────────────────────────────────────────────
# VOLÚMENES
# ────────────────────────────────────────────────────────
volumes:
  nexus_pg_data:
    driver: local
    name:   nexus_erp_postgres_data
  nexus_backend_logs:
    driver: local
    name:   nexus_erp_backend_logs
  nexus_sonar_data:
    driver: local
    name:   nexus_sonar_data
  nexus_sonar_extensions:
    driver: local
    name:   nexus_sonar_extensions
  nexus_sonar_logs:
    driver: local
    name:   nexus_sonar_logs
  nexus_caddy_data:
    driver: local
    name:   nexus_caddy_data
  nexus_caddy_config:
    driver: local
    name:   nexus_caddy_config

# ────────────────────────────────────────────────────────
# REDES
# ────────────────────────────────────────────────────────
networks:
  nexus_internal:
    driver: bridge
    name:   nexus_erp_network