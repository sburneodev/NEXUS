# ── QA-02: SonarQube — nexus-erp ─────────────────────────────────────
# Este fichero complementa la invocación Maven del ci.yml.
# Las propiedades aquí definidas se aplican al análisis estático.

sonar.projectKey=nexus-erp
sonar.projectName=LevelUp Nexus ERP
sonar.projectVersion=1.0.0

# Código fuente del backend (único módulo analizado)
sonar.sources=backend/src/main/java
sonar.tests=backend/src/test/java
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes

# Informe de cobertura generado por JaCoCo (ver pom.xml)
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# Encoding
sonar.sourceEncoding=UTF-8

# ── Exclusiones ───────────────────────────────────────────────────────
# Clases sin lógica testeable: entidades JPA, DTOs, main de arranque
sonar.exclusions=\
  **/NexusBackendApplication.java,\
  **/model/**,\
  **/dto/**,\
  **/GenerarHashes.java

sonar.coverage.exclusions=\
  **/NexusBackendApplication.java,\
  **/model/**,\
  **/dto/**,\
  **/GenerarHashes.java

# ── Umbrales de calidad (Quality Gate sugerido) ───────────────────────
# SonarQube Community usa el Quality Gate por defecto.
# Para obtener nota B o superior en Maintainability:
#   - 0 vulnerabilidades críticas
#   - 0 bugs bloqueantes
#   - Code smells < 5 % del tiempo de deuda técnica
# Estos umbrales se configuran en el panel web de SonarQube,
# no en este fichero. Este fichero solo configura el scanner.